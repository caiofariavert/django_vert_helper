name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          make test-unit PYTHON=python3

  stack-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start docker compose stack
        run: |
          make stack-up

      - name: Smoke tests on default services
        run: |
          make stack-smoke

      - name: Show docker compose logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yml logs

      - name: Shutdown docker compose stack
        if: always()
        run: |
          make stack-down

  scan-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem and image scan
        run: |
          make scan-audit \
            DOCKER_REPO=${{ github.event.repository.name }} \
            DOCKER_TAG=${{ github.sha }} \
            DOCKERFILE=Dockerfile-example \
            DOCKER_CONTEXT=.
