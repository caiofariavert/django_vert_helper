name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image (Dockerfile)
        run: |
          docker build --no-cache \
            -f Dockerfile \
            -t ${{ github.event.repository.name }}:${{ github.sha }} \
            .

      - name: Run unit tests via Docker image
        run: |
          docker run --rm \
            -e DJANGO_SETTINGS_MODULE=vert_helper.tests.settings \
            ${{ github.event.repository.name }}:${{ github.sha }} \
            python -m django test vert_helper.tests -v 2

  scan-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for scan
        run: |
          docker build --no-cache \
            -f Dockerfile \
            -t ${{ github.event.repository.name }}:${{ github.sha }} \
            .

      - name: Trivy - Filesystem scan
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            aquasec/trivy:0.69.3 \
            fs --exit-code 1 --severity HIGH,CRITICAL \
            --scanners vuln,secret --format table ./

      - name: Trivy - Image scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.69.3 \
            image --exit-code 1 --ignore-unfixed \
            --severity HIGH,CRITICAL --scanners vuln --format table \
            ${{ github.event.repository.name }}:${{ github.sha }}
